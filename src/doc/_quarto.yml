#
#
#
# Project settings
#
#
#

project:
  output-dir: output
  render:
    - pages
  resources:
    - public/icons

revealjs-plugins:
  - attribution

filters:
  - latex-environment
  - filters.lua

lightbox: auto

commands: [hl]

execute:
  # include: false
  echo: false
  output: false
  enabled: true
  # cache: true
  # freeze: auto

#
#
#
# Shared document settings
#
#
#

bibliography:
  - references.yaml
  # - extra-references.yaml

colorlinks: true
number-sections: true

crossref:
  thm-prefix: "RQ"
  thm-title: "Research Question"

mermaid:
  theme: neutral

callout-appearance: simple

format:
  main-html:
    output-file: digital
  main-typst:
    output-file: print
  # main-pdf:
  #   output-file: print
  #   include-before-body:
  #     text: |
  #       \ifdefined\thetheorem
  #         \renewcommand{\thetheorem}{\arabic{theorem}}
  #       \else
  #       \fi
